<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOVA | Shopping Bag</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4ebdeff; font-family: 'Verdana', sans-serif; margin: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 20px; }
        .logo img { height: 60px; }
        nav { background-color: #D3D3D3; border: 1px solid #999; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
        nav ul li { border-right: 1px solid #999; }
        nav ul li a { text-decoration: none; color: black; padding: 15px 25px; display: block; }
        .active { background-color: #92a097ff; font-weight: bold; }

        .cart-container { display: flex; max-width: 1100px; margin: 40px auto; gap: 20px; padding: 20px; }
        .items-section { flex: 2; }
        .summary-section { flex: 1; background: #D3D3D3; padding: 20px; border: 1px solid #999; border-radius: 8px; height: fit-content; }
        
        .cart-item { display: flex; align-items: center; background: transparent; padding: 15px 0; border-bottom: 1px solid #bbb; gap: 20px; }
        .cart-item img { width: 100px; height: 130px; object-fit: cover; border-radius: 4px; }
        .item-info { flex: 1; background: #D3D3D3; padding: 15px; border-radius: 8px; border: 1px solid #999; font-family: 'Montserrat', sans-serif; }
        
        .price-stack { min-width: 90px; text-align: center; }
        .old-p { text-decoration: line-through; color: #666; font-size: 0.8rem; display: block; }
        .new-p { font-weight: bold; font-size: 1.2rem; }
        .promo-red { color: #d67b7b; }

        .qty-box { display: flex; align-items: center; border: 1px solid #333; background: #D3D3D3; height: 40px; }
        .qty-btn { background: #92a097ff; border: none; padding: 0 15px; cursor: pointer; font-weight: bold; height: 100%; font-size: 1.2rem; }
        .qty-num { padding: 0 15px; font-weight: bold; }
        
        .checkout-btn { width: 100%; background: #92a097; padding: 15px; border: 1px solid #333; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="images/NOVA.gif" alt="Logo"></div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html" class="active">Cart</a></li>
        </ul>
    </nav>
</header>

<div class="cart-container">
    <div class="items-section">
        <h1 style="font-family: 'Montserrat', sans-serif;">ALL ITEMS</h1>
        <div id="cartList"></div>
    </div>

    <div class="summary-section">
        <h2 style="font-family: 'Montserrat', sans-serif;">Order Summary</h2>
        <p>Subtotal: <span id="subtotal">£0.00</span></p>
        <p style="color: #d67b7b;">Promotions: -£<span id="promo">0.00</span></p>
        <hr>
        <h3 style="color: #d67b7b;">Estimated total: <span id="total">£0.00</span></h3>
        <button class="checkout-btn" id="checkOutText">Checkout Now (0)</button>
        <button onclick="emptyCart()" style="margin-top:20px; width:100%; cursor:pointer; background:none; border:none; text-decoration:underline;">Clear All Items</button>
    </div>
</div>

<script>
    function displayCart() {
        const list = document.getElementById('cartList');
        const cart = JSON.parse(localStorage.getItem('novaCart')) || [];
        
        let displaySubtotal = 0; 
        let totalDiscount = 0;   
        let itemCount = 0;

        if (cart.length === 0) {
            list.innerHTML = "<p>Your bag is currently empty.</p>";
        } else {
            list.innerHTML = '';
            cart.forEach((item, index) => {
                itemCount += item.qty;
                
                const originalPrice = item.oldPrice ? parseFloat(item.oldPrice) : item.price;
                const salePrice = item.price;
                
                displaySubtotal += (originalPrice * item.qty);
                totalDiscount += (originalPrice - salePrice) * item.qty;

                const isSale = item.oldPrice && item.oldPrice > item.price;
                
                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="item-info">${item.name}</div>
                        
                        <div class="price-stack">
                            ${isSale ? `<span class="old-p">£${originalPrice.toFixed(2)}</span>` : ''}
                            <span class="new-p ${isSale ? 'promo-red' : ''}">£${salePrice.toFixed(2)}</span>
                        </div>

                        <div class="qty-box">
                            <button class="qty-btn" onclick="changeQuantity(${index}, -1)">-</button>
                            <div class="qty-num">${item.qty}</div>
                            <button class="qty-btn" onclick="changeQuantity(${index}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
        }

        const finalTotal = displaySubtotal - totalDiscount;

        document.getElementById('subtotal').innerText = "£" + displaySubtotal.toFixed(2);
        document.getElementById('promo').innerText = totalDiscount.toFixed(2);
        document.getElementById('total').innerText = "£" + finalTotal.toFixed(2);
        document.getElementById('checkOutText').innerText = "Checkout Now (" + itemCount + ")";
    }

    function changeQuantity(index, amount) {
        let cart = JSON.parse(localStorage.getItem('novaCart')) || [];
        cart[index].qty += amount;
        if (cart[index].qty <= 0) { cart.splice(index, 1); }
        localStorage.setItem('novaCart', JSON.stringify(cart));
        displayCart();
    }

    function emptyCart() {
        localStorage.removeItem('novaCart');
        displayCart();
    }

    window.onload = displayCart;
</script>

</body>
</html>
